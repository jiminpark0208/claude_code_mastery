<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대중교통 BMT 통합 대시보드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 20px; background-color: #f0f2f6; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .config-panel { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { padding: 20px; border-radius: 10px; text-align: center; color: white; font-weight: bold; }
        .total { background: #3498db; }
        .rate { background: #9b59b6; }
        .status { background: #2c3e50; }
        .pass { color: #2ecc71; }
        .fail { color: #e74c3c; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        th { background: #f4f4f4; position: sticky; top: 0; }
        .step { display: inline-block; background: #eef; padding: 2px 6px; border-radius: 4px; margin: 2px; font-size: 12px; border: 1px solid #ccd; }
        button { padding: 10px 20px; background: #ff4b4b; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #d43f3f; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚌 대중교통 BMT 분석 시스템 (Local HTML)</h1>
    
    <div class="config-panel">
        <h3>⚙️ 설정 및 실행</h3>
        <label>CSV 파일 선택: </label>
        <input type="file" id="csvFile" accept=".csv"><br><br>
        <label>분석 개수 설정: </label>
        <input type="number" id="analysisLimit" value="10" min="1" max="900">
        <button onclick="runBMT()">🚀 BMT 분석 시작</button>
    </div>

    <div class="stats-grid" id="statsArea" style="display:none;">
        <div class="stat-card total"><h4>총 분석 건수</h4><div id="statTotal">0</div></div>
        <div class="stat-card rate"><h4>일치율 (Pass %)</h4><div id="statRate">0%</div></div>
        <div class="stat-card status"><h4>최종 판정</h4><div id="statFinal">-</div></div>
    </div>

    <progress id="progressBar" value="0" max="100" style="width:100%; display:none;"></progress>

    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>ID</th>
                <th>결과</th>
                <th>시간차(초)</th>
                <th>자체 경로 (A)</th>
                <th>아로 경로 (타사)</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
    const ARO_KEY = "XvEHGGgKHWGzqacvEe4FHQ";
    const OUR_URL = "http://km-public-transit-multimodal.dev.onkakao.net/publictransit/v1/route/multimodal";

    async function runBMT() {
        const file = document.getElementById('csvFile').files[0];
        const limit = parseInt(document.getElementById('analysisLimit').value);
        if (!file) return alert("CSV 파일을 업로드해주세요.");

        Papa.parse(file, {
            header: true,
            complete: async function(results) {
                const data = results.data.slice(0, limit);
                await processData(data);
            }
        });
    }

    async function processData(data) {
        const body = document.getElementById('resultBody');
        const progress = document.getElementById('progressBar');
        body.innerHTML = "";
        document.getElementById('statsArea').style.display = 'grid';
        document.getElementById('resultTable').style.display = 'table';
        progress.style.display = 'block';

        let passCount = 0;
        const total = data.length;

        for (let i = 0; i < total; i++) {
            const row = data[i];
            const sx = row.st_x, sy = row.st_y, ex = row.ed_x, ey = row.ed_y;

            try {
                // 1. 자체 엔진 호출 (CORS 우회 필요 시 서버 경유 권장)
                // 브라우저 직접 호출 시 CORS 정책에 따라 에러가 날 수 있음
                const ourRes = await fetch(`${OUR_URL}?start=${sx},${sy}&goal=${ex},${ey}&radius=700&service=test`, {
                    headers: { 'service': 'test' }
                }).then(r => r.json());

                // 2. 아로 엔진 호출
                const aroRes = await fetch(`https://api.odsay.com/v1/api/searchPubTransPathT?SX=${sx}&SY=${sy}&EX=${ex}&EY=${ey}&apiKey=${ARO_KEY}`, {
                    headers: { 'Referer': 'http://localhost' }
                }).then(r => r.json());

                // 3. 데이터 파싱 (단순화된 예시)
                const o_path = "경로 데이터 추출중...";
                const a_path = "경로 데이터 추출중...";
                const is_pass = true; // 실제 비교 로직 적용 지점

                if (is_pass) passCount++;

                body.innerHTML += `
                    <tr>
                        <td>${i+1}</td>
                        <td class="${is_pass ? 'pass' : 'fail'}">${is_pass ? '✅ Pass' : '❌ Fail'}</td>
                        <td>-</td>
                        <td>${o_path}</td>
                        <td>${a_path}</td>
                    </tr>
                `;
            } catch (e) {
                body.innerHTML += `<tr><td>${i+1}</td><td class="fail">⚠️ Error</td><td colspan="3">${e.message}</td></tr>`;
            }
            progress.value = ((i + 1) / total) * 100;
        }

        const rate = (passCount / total * 100).toFixed(1);
        document.getElementById('statTotal').innerText = total + "건";
        document.getElementById('statRate').innerText = rate + "%";
        document.getElementById('statFinal').innerText = rate >= 80 ? "합격 (SUCCESS)" : "불합격 (FAIL)";
    }
</script>
</body>
</html>
